name: Deploy Godot Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'godot_demo/web/**'
      - '.github/workflows/deploy-godot-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Add COOP/COEP/no-cache headers (for Pages)
        run: |
          cat > godot_demo/web/_headers <<'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
            Cross-Origin-Resource-Policy: cross-origin
            Cache-Control: no-store, no-cache, must-revalidate, max-age=0
          EOF

      - uses: actions/configure-pages@v5
        with:
          # 自動啟用 GitHub Pages(repo Settings 不用手動開)
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: godot_demo/web

      - id: deployment
        uses: actions/deploy-pages@v4
